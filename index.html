<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Left Outlane Open League - Leaderboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      overflow: hidden;
      position: relative;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px;
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
    }

    h2 {
      font-size: 1.4rem;
      color: #ccc;
      margin-top: 5px;
    }

    .box {
      background: rgba(26, 26, 26, 0.92);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1.3rem;
    }

    th, td {
      border: 1px solid #333;
      padding: 16px;
      text-align: left;
    }

    th {
      background: #262626;
      font-size: 1.2rem;
    }

    .loading {
      padding: 12px;
      margin-bottom: 10px;
      background: #1f2530;
      border-radius: 8px;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      color: #aaa;
      font-size: 1rem;
    }

    /* Bouncing logo */
    .floating-logo {
      position: fixed;
      width: 240px;
      height: 240px;
      background-image: url('b1b-logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      opacity: 0.06;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <!-- Bouncing logo -->
  <div class="floating-logo" id="floatingLogo"></div>

  <div class="wrap">

    <div class="hero">
      <h1>Left Outlane Open League</h1>
      <h2>The “I Might Show Up” League</h2>
    </div>

    <div class="box">
      <div id="loading" class="loading">Loading leaderboard...</div>

      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Points</th>
            <th>Weeks Played</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>

    <div class="footer">
      Last updated: <span id="last-updated">Waiting...</span>
    </div>

  </div>

  <script>
    // 🔗 PASTE YOUR GOOGLE SHEET CSV LINK HERE
    const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXqYOBiMAqP2MOcDlEJ9rDTIZBrCfb3Lb0A_l3t9tzTdOOoGcTiUrw14Vw9euaMiptQgSJipp7GXX2/pub?gid=438399248&single=true&output=csv";

    function parseCSV(text) {
      return text.trim().split("\n").map(row => row.split(","));
    }

    async function loadLeaderboard() {
      const loading = document.getElementById("loading");
      const tbody = document.getElementById("leaderboard-body");
      const lastUpdated = document.getElementById("last-updated");

      try {
        const response = await fetch(sheetCsvUrl + "&cachebust=" + Date.now());
        const text = await response.text();
        const rows = parseCSV(text);

        const data = rows.slice(1);
        tbody.innerHTML = "";

        data.forEach(row => {
          if (row.length < 4) return;

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row[0]}</td>
            <td>${row[1]}</td>
            <td>${row[2]}</td>
            <td>${row[3]}</td>
          `;
          tbody.appendChild(tr);
        });

        loading.style.display = "none";
        lastUpdated.textContent = new Date().toLocaleTimeString();

      } catch (err) {
        loading.textContent = "Error loading leaderboard";
        console.error(err);
      }
    }

    loadLeaderboard();

    // 🎯 REAL bouncing logo logic
    const logo = document.getElementById("floatingLogo");

    let x = 50;
    let y = 50;
    let dx = 1.2;
    let dy = 1.0;

    function animateLogo() {
      const logoWidth = logo.offsetWidth;
      const logoHeight = logo.offsetHeight;
      const maxX = window.innerWidth - logoWidth;
      const maxY = window.innerHeight - logoHeight;

      x += dx;
      y += dy;

      if (x <= 0 || x >= maxX) dx *= -1;
      if (y <= 0 || y >= maxY) dy *= -1;

      logo.style.left = x + "px";
      logo.style.top = y + "px";

      requestAnimationFrame(animateLogo);
    }

    animateLogo();
  </script>

</body>
</html>
