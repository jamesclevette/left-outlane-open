<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Left Outlane Open League - Leaderboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      overflow: hidden;
      position: relative;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px;
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
    }

    h2 {
      font-size: 1.4rem;
      color: #ccc;
      margin-top: 5px;
    }

    .box {
      background: rgba(26, 26, 26, 0.92);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1.3rem;
    }

    th, td {
      border: 1px solid #333;
      padding: 16px;
      text-align: left;
    }

    th {
      background: #262626;
      font-size: 1.2rem;
    }

    .loading {
      padding: 12px;
      margin-bottom: 10px;
      background: #1f2530;
      border-radius: 8px;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      color: #aaa;
      font-size: 1rem;
    }

    .floating-logo {
      position: fixed;
      width: 240px;
      height: 240px;
      z-index: 0;
      pointer-events: none;
      opacity: 0.12;
      transition: filter 0.2s linear;
    }

    .floating-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: brightness(0) saturate(100%) invert(100%);
    }
  </style>
</head>

<body>
  <div class="floating-logo" id="floatingLogo">
    <img id="floatingLogoImg" src="b1b-logo.png" alt="">
  </div>

  <div class="wrap">
    <div class="hero">
      <h1>Left Outlane Open League</h1>
      <h2>The “I Might Show Up” League</h2>
    </div>

    <div class="box">
      <div id="loading" class="loading">Loading leaderboard...</div>

      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Points</th>
            <th>Weeks Played</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>

    <div class="footer">
      Last updated: <span id="last-updated">Waiting...</span>
    </div>
  </div>

  <script>
    const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXqYOBiMAqP2MOcDlEJ9rDTIZBrCfb3Lb0A_l3t9tzTdOOoGcTiUrw14Vw9euaMiptQgSJipp7GXX2/pub?gid=438399248&single=true&output=csv";

    function parseCSV(text) {
      return text.trim().split("\n").map(row => row.split(","));
    }

    async function loadLeaderboard() {
      const loading = document.getElementById("loading");
      const tbody = document.getElementById("leaderboard-body");
      const lastUpdated = document.getElementById("last-updated");

      try {
        const response = await fetch(sheetCsvUrl + "&cachebust=" + Date.now());
        const text = await response.text();
        const rows = parseCSV(text);

        const data = rows.slice(1);
        tbody.innerHTML = "";

        data.forEach(row => {
          if (row.length < 4) return;

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row[0]}</td>
            <td>${row[1]}</td>
            <td>${row[2]}</td>
            <td>${row[3]}</td>
          `;
          tbody.appendChild(tr);
        });

        loading.style.display = "none";
        lastUpdated.textContent = new Date().toLocaleTimeString();

      } catch (err) {
        loading.textContent = "Error loading leaderboard";
        console.error(err);
      }
    }

    loadLeaderboard();

    const logo = document.getElementById("floatingLogo");
    const logoImg = document.getElementById("floatingLogoImg");

    let x = 50;
    let y = 50;
    let dx = 3.8;
    let dy = 3.2;

    const hues = [0, 35, 60, 120, 180, 220, 280, 320];
    let hueIndex = 0;

    function updateLogoColor() {
      const hue = hues[hueIndex];
      logoImg.style.filter = `brightness(0) saturate(100%) invert(100%) sepia(100%) saturate(3000%) hue-rotate(${hue}deg) brightness(1.1)`;
    }

    function changeColor() {
      hueIndex = (hueIndex + 1) % hues.length;
      updateLogoColor();
    }

    function animateLogo() {
      const logoWidth = logo.offsetWidth;
      const logoHeight = logo.offsetHeight;
      const maxX = window.innerWidth - logoWidth;
      const maxY = window.innerHeight - logoHeight;

      x += dx;
      y += dy;

      let bounced = false;

      if (x <= 0) {
        x = 0;
        dx *= -1;
        bounced = true;
      } else if (x >= maxX) {
        x = maxX;
        dx *= -1;
        bounced = true;
      }

      if (y <= 0) {
        y = 0;
        dy *= -1;
        bounced = true;
      } else if (y >= maxY) {
        y = maxY;
        dy *= -1;
        bounced = true;
      }

      if (bounced) {
        changeColor();
      }

      logo.style.left = x + "px";
      logo.style.top = y + "px";

      requestAnimationFrame(animateLogo);
    }

    updateLogoColor();
    animateLogo();
  </script>
</body>
</html>
