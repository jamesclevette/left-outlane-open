<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Left Outlane Open League - Leaderboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px;
    }

    .hero {
      text-align: center;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
    }

    h2 {
      font-size: 1.4rem;
      color: #ccc;
      margin-top: 5px;
    }

    .box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1.3rem;
    }

    th, td {
      border: 1px solid #333;
      padding: 16px;
      text-align: left;
    }

    th {
      background: #262626;
      font-size: 1.2rem;
    }

    .loading {
      padding: 12px;
      margin-bottom: 10px;
      background: #1f2530;
      border-radius: 8px;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      color: #aaa;
      font-size: 1rem;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="hero">
      <h1>Left Outlane Open League</h1>
      <h2>The “I Might Show Up” League</h2>
    </div>

    <div class="box">
      <div id="loading" class="loading">Loading leaderboard...</div>

      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Points</th>
            <th>Weeks Played</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>

    <div class="footer">
      Last updated: <span id="last-updated">Waiting...</span>
    </div>

  </div>

  <script>
    const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXqYOBiMAqP2MOcDlEJ9rDTIZBrCfb3Lb0A_l3t9tzTdOOoGcTiUrw14Vw9euaMiptQgSJipp7GXX2/pub?gid=438399248&single=true&output=csv";

    function parseCSV(text) {
      return text.trim().split("\n").map(row => row.split(","));
    }

    async function loadLeaderboard() {
      const loading = document.getElementById("loading");
      const tbody = document.getElementById("leaderboard-body");
      const lastUpdated = document.getElementById("last-updated");

      try {
        const response = await fetch(sheetCsvUrl + "&cachebust=" + Date.now());
        const text = await response.text();
        const rows = parseCSV(text);

        const data = rows.slice(1);
        tbody.innerHTML = "";

        data.forEach(row => {
          if (row.length < 4) return;

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row[0]}</td>
            <td>${row[1]}</td>
            <td>${row[2]}</td>
            <td>${row[3]}</td>
          `;
          tbody.appendChild(tr);
        });

        loading.style.display = "none";
        lastUpdated.textContent = new Date().toLocaleTimeString();

      } catch (err) {
        loading.textContent = "Error loading leaderboard";
        console.error(err);
      }
    }

    loadLeaderboard();
  </script>
</body>
</html>
