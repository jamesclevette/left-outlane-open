<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Left Outlane Open League - Leaderboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      overflow: hidden;
      position: relative;
    }

    .floating-logo {
      position: fixed;
      width: 240px;
      height: 240px;
      z-index: 0;
      pointer-events: none;
      opacity: 0.12;
    }

    .floating-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .wrap {
      width: 96vw;
      max-width: 1500px;
      margin: 0 auto;
      padding: 22px;
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 2.4rem;
      margin: 0;
    }

    h2 {
      font-size: 1rem;
      color: #ccc;
      margin: 4px 0 0;
    }

    .box {
      background: rgba(26, 26, 26, 0.94);
      border: 1px solid #333;
      border-radius: 14px;
      padding: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th, td {
      border: 1px solid #333;
      padding: 8px 10px;
      text-align: center;
      white-space: nowrap;
    }

    th {
      background: #262626;
      font-weight: bold;
    }

    th:first-child,
    td:first-child {
      text-align: left;
      min-width: 180px;
    }

    .loading {
      padding: 10px;
      margin-bottom: 10px;
      background: #1f2530;
      border-radius: 8px;
    }

    .footer {
      text-align: center;
      margin-top: 10px;
      color: #aaa;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>
  <div class="floating-logo" id="floatingLogo">
    <img id="floatingLogoImg" src="b1b-logo.png" alt="">
  </div>

  <div class="wrap">
    <div class="hero">
      <h1>Left Outlane Open League</h1>
      <h2>The “I Might Show Up” League</h2>
    </div>

    <div class="box">
      <div id="loading" class="loading">Loading leaderboard...</div>
      <table id="leaderboard-table"></table>
    </div>

    <div class="footer">
      Last updated: <span id="last-updated">Waiting...</span>
    </div>
  </div>

  <script>
    const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/1K07u7EoAzwRBQCO2GBxfmnSklryGxsWrpqjWTdtD-wE/edit?gid=438399248#gid=438399248";

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }

      return rows.filter(r => r.some(c => c.trim() !== ""));
    }

    async function loadLeaderboard() {
      const loading = document.getElementById("loading");
      const table = document.getElementById("leaderboard-table");
      const lastUpdated = document.getElementById("last-updated");

      try {
        const response = await fetch(sheetCsvUrl + "&cachebust=" + Date.now());
        const text = await response.text();
        const rows = parseCSV(text);

        table.innerHTML = "";

        const thead = document.createElement("thead");
        const tbody = document.createElement("tbody");

        rows.forEach((row, index) => {
          const tr = document.createElement("tr");

          row.forEach(cell => {
            const el = document.createElement(index === 0 ? "th" : "td");
            el.textContent = cell;
            tr.appendChild(el);
          });

          if (index === 0) {
            thead.appendChild(tr);
          } else {
            tbody.appendChild(tr);
          }
        });

        table.appendChild(thead);
        table.appendChild(tbody);

        loading.style.display = "none";
        lastUpdated.textContent = new Date().toLocaleTimeString();

      } catch (err) {
        loading.textContent = "Error loading leaderboard";
        console.error(err);
      }
    }

    loadLeaderboard();

    const logo = document.getElementById("floatingLogo");
    const logoImg = document.getElementById("floatingLogoImg");

    let x = 50;
    let y = 50;
    let dx = 3.8;
    let dy = 3.2;

    const hues = [0, 35, 60, 120, 180, 220, 280, 320];
    let hueIndex = 0;

    function updateLogoColor() {
      const hue = hues[hueIndex];
      logoImg.style.filter = `brightness(0) saturate(100%) invert(100%) sepia(100%) saturate(3000%) hue-rotate(${hue}deg) brightness(1.1)`;
    }

    function changeColor() {
      hueIndex = (hueIndex + 1) % hues.length;
      updateLogoColor();
    }

    function animateLogo() {
      const logoWidth = logo.offsetWidth;
      const logoHeight = logo.offsetHeight;
      const maxX = window.innerWidth - logoWidth;
      const maxY = window.innerHeight - logoHeight;

      x += dx;
      y += dy;

      let bounced = false;

      if (x <= 0) {
        x = 0;
        dx *= -1;
        bounced = true;
      } else if (x >= maxX) {
        x = maxX;
        dx *= -1;
        bounced = true;
      }

      if (y <= 0) {
        y = 0;
        dy *= -1;
        bounced = true;
      } else if (y >= maxY) {
        y = maxY;
        dy *= -1;
        bounced = true;
      }

      if (bounced) changeColor();

      logo.style.left = x + "px";
      logo.style.top = y + "px";

      requestAnimationFrame(animateLogo);
    }

    updateLogoColor();
    animateLogo();
  </script>
</body>
</html>
